  - generic [ref=e354]:
    - generic [ref=e355]:
      - heading "Frequently Asked Questions" [level=2] [ref=e356]
      - paragraph [ref=e357]: Everything you need to know about TailorDost
    - generic [ref=e358]:
      - generic [ref=e359]:
        - button "What is TailorDost and who is it for?" [ref=e360]:
          - generic [ref=e361]: What is TailorDost and who is it for?
          - img [ref=e362]
        - generic: TailorDost is a purpose-built order management application for boutique owners who take custom garment orders. It brings the entire order lifecycle — from recording a customer's measurements to tracking fabric, stitching progress, and final payment — into one organized platform, replacing paper notebooks, spreadsheets, and scattered WhatsApp messages.
      - generic [ref=e364]:
        - button "How does order progress tracking work?" [ref=e365]:
          - generic [ref=e366]: How does order progress tracking work?
          - img [ref=e367]
        - generic: "Every order in TailorDost moves through a clear six-stage workflow: Pending → Cutting → Stitching → Trial Ready → Completed → Delivered. Moving an order to the next stage is a single click, making it easy to keep records current even in a busy shop. The dashboard surfaces overdue orders and orders due this week so you always know what needs priority attention."
      - generic [ref=e369]:
        - button "Can I store design photos and fabric details with each order?" [ref=e370]:
          - generic [ref=e371]: Can I store design photos and fabric details with each order?
          - img [ref=e372]
        - generic: Yes. For each order you can upload design reference photos, write special stitching instructions, record fabric type, color, and source, and attach photos of the actual fabric. You can also upload customer photos, trial fitting photos, and final garment photos — organized in separate categories so every visual record is easy to find.
      - generic [ref=e374]:
        - button "How does billing and payment tracking work?" [ref=e375]:
          - generic [ref=e376]: How does billing and payment tracking work?
          - img [ref=e377]
        - generic: Each order records fabric cost and stitching cost separately, with the total calculated automatically. Payment status — Paid, Partially Paid, or Unpaid — can be updated as payments come in. The dashboard shows a count of orders with outstanding balances so you always know which customers owe money before an order is delivered.
      - generic [ref=e379]:
        - button "Is my data private and secure?" [ref=e380]:
          - generic [ref=e381]: Is my data private and secure?
          - img [ref=e382]
        - generic: Absolutely. Each boutique's data is completely isolated — you can only ever see your own customers and orders. We use bank-level encryption for all stored data and maintain strict access controls. Enterprise plans also support self-hosted deployment for boutique chains that want complete data ownership on their own servers.
      - generic [ref=e384]:
        - button "Can customers track their own orders?" [ref=e385]:
          - generic [ref=e386]: Can customers track their own orders?
          - img [ref=e387]
        - generic: Yes. You can generate a secure, shareable tracking link for any order and send it to your customer via WhatsApp or SMS. The customer can open the link without logging in to see the current status of their order, along with design references, fabric details, and photos. Link expiration is configurable, and you can deactivate any link at any time if it was shared with the wrong contact. Multiple links can be generated for the same order as needed.
      - generic [ref=e389]:
        - button "Can my tailoring staff view orders without accessing my account?" [ref=e390]:
          - generic [ref=e391]: Can my tailoring staff view orders without accessing my account?
          - img [ref=e392]
        - generic: Yes. TailorDost lets you generate a separate tailor team link that shows all active orders in one place. Each order is labeled Overdue, Due Soon, or Upcoming — so your staff can prioritize stitching without needing your login credentials or waiting for you to brief them individually. Link expiration is configurable, and links can be deactivated at any time from the Tailor Tracking Links page.
